name: AMCU Practice Monitor

on:
  workflow_dispatch:
    inputs:
      lookback_months:
        description: "How many recent months of AMCU decision ZIPs to scan"
        required: false
        default: "4"
      force:
        description: "Force resource recheck even if metadata/hash is unchanged; does not force Gemini reanalysis"
        required: false
        default: "false"
      force_reanalyze_decisions:
        description: "Force Gemini reanalysis for already analyzed decisions"
        required: false
        default: "false"
      skip_gemini:
        description: "Test mode: run extraction/filtering without Gemini calls"
        required: false
        default: "false"
      dry_run:
        description: "Do not write state/results and do not commit changes"
        required: false
        default: "false"
      max_gemini_calls:
        description: "Global max Gemini calls per run"
        required: false
        default: "20"
      gemini_rpm_limit:
        description: "Conservative Gemini requests-per-minute limit"
        required: false
        default: "10"
      gemini_tpm_limit:
        description: "Conservative Gemini input-tokens-per-minute limit"
        required: false
        default: "220000"
      include_concentration_p12:
        description: "Include p.12 Art.50 concentration-without-permit decisions in practice DB"
        required: false
        default: "true"

  schedule:
    # 08:40 Kyiv during UTC+3, Monday-Friday.
    # During winter UTC+2 this will run at 07:40 Kyiv; adjust if exact local time matters.
    - cron: "40 5 * * 1-5"

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip antiword pandoc

      - name: Install Node dependencies
        run: npm install

      - name: Run AMCU practice monitor
        env:
          LOOKBACK_MONTHS: ${{ github.event.inputs.lookback_months || '4' }}
          FORCE_RESOURCES: ${{ github.event.inputs.force || 'false' }}
          FORCE_REANALYZE_DECISIONS: ${{ github.event.inputs.force_reanalyze_decisions || 'false' }}
          SKIP_GEMINI: ${{ github.event.inputs.skip_gemini || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

          # Practice DB mode
          EMAIL_DISABLED: "true"
          PRACTICE_DB_ENABLED: "true"
          INCLUDE_CONCENTRATION_P12: ${{ github.event.inputs.include_concentration_p12 || 'true' }}
          INCLUDE_PROCEDURAL_DECISIONS: "false"

          # Gemini limits / quota safety
          MAX_GEMINI_CALLS: ${{ github.event.inputs.max_gemini_calls || '20' }}
          GEMINI_RPM_LIMIT: ${{ github.event.inputs.gemini_rpm_limit || '10' }}
          GEMINI_TPM_LIMIT: ${{ github.event.inputs.gemini_tpm_limit || '220000' }}
          GEMINI_RETRY_MAX: "4"
          GEMINI_RETRY_BUFFER_MS: "1500"

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

          # SMTP secrets are kept for compatibility, but email is disabled via EMAIL_DISABLED=true.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

        run: node scripts/amku_monitor.mjs

      - name: Commit AMCU practice data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p data/practice
          touch data/amku_events.jsonl

          git add data/amku_state.json data/amku_results.json data/amku_events.jsonl data/practice

          if [ -d "docs/amku" ]; then
            git add docs/amku
          fi

          if git diff --cached --quiet; then
            echo "No AMCU practice data changes to commit."
          else
            git commit -m "Update AMCU practice data"
            git push
          fi
