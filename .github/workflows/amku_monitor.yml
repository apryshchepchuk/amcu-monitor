name: AMCU Practice Monitor

on:
  workflow_dispatch:
    inputs:
      backfill_enabled:
        description: "Process only the next unfinished month(s); skips fully clean months"
        required: false
        default: "true"

      backfill_months_per_run:
        description: "How many unfinished months to process per run"
        required: false
        default: "1"

      backfill_from_month:
        description: "Optional lower bound for backfill, YYYY-MM"
        required: false
        default: ""

      backfill_to_month:
        description: "Optional upper bound for backfill, YYYY-MM"
        required: false
        default: ""

      lookback_months:
        description: "Fallback recent-month scan when backfill_enabled=false"
        required: false
        default: "4"

      force:
        description: "Force resource recheck even if metadata/hash is unchanged; does not force Gemini reanalysis"
        required: false
        default: "false"

      force_reanalyze_decisions:
        description: "Force Gemini reanalysis for already analyzed decisions"
        required: false
        default: "false"

      skip_gemini:
        description: "Test mode: run extraction/filtering without Gemini calls"
        required: false
        default: "false"

      dry_run:
        description: "Do not write state/results/dashboard data and do not commit changes"
        required: false
        default: "false"

      max_gemini_calls:
        description: "Global max Gemini calls per run"
        required: false
        default: "15"

      gemini_rpm_limit:
        description: "Conservative Gemini requests-per-minute limit"
        required: false
        default: "5"

      gemini_tpm_limit:
        description: "Conservative Gemini input-tokens-per-minute limit"
        required: false
        default: "120000"

      max_text_chars:
        description: "Max extracted decision text chars sent to Gemini"
        required: false
        default: "90000"

      gemini_token_estimate_chars_per_token:
        description: "Conservative chars-per-token estimator for local TPM throttling"
        required: false
        default: "2.0"

      include_concentration_p12:
        description: "Include p.12 Art.50 concentration-without-permit decisions in practice DB"
        required: false
        default: "true"

  schedule:
    # Three daily gradual backfill runs.
    # UTC 06:10, 11:10, 16:10 = Kyiv 09:10, 14:10, 19:10 during UTC+3.
    # During winter UTC+2 this will run at 08:10, 13:10, 18:10 Kyiv.
    - cron: "10 6,11,16 * * *"

concurrency:
  group: amku-practice-backfill
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip antiword pandoc

      - name: Install Node dependencies
        run: npm install

      - name: Check AMCU scripts syntax
        run: |
          node --check scripts/amku_monitor.mjs
          node --check scripts/amku_build_dashboard.mjs

      - name: Run AMCU practice backfill
        env:
          BACKFILL_ENABLED: ${{ github.event.inputs.backfill_enabled || 'true' }}
          BACKFILL_MONTHS_PER_RUN: ${{ github.event.inputs.backfill_months_per_run || '1' }}
          BACKFILL_FROM_MONTH: ${{ github.event.inputs.backfill_from_month || '' }}
          BACKFILL_TO_MONTH: ${{ github.event.inputs.backfill_to_month || '' }}

          LOOKBACK_MONTHS: ${{ github.event.inputs.lookback_months || '4' }}
          FORCE_RESOURCES: ${{ github.event.inputs.force || 'false' }}
          FORCE_REANALYZE_DECISIONS: ${{ github.event.inputs.force_reanalyze_decisions || 'false' }}
          SKIP_GEMINI: ${{ github.event.inputs.skip_gemini || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

          # Practice DB mode
          EMAIL_DISABLED: "true"
          PRACTICE_DB_ENABLED: "true"
          INCLUDE_CONCENTRATION_P12: ${{ github.event.inputs.include_concentration_p12 || 'true' }}
          INCLUDE_PROCEDURAL_DECISIONS: "false"

          # Gemini limits / quota safety
          MAX_GEMINI_CALLS: ${{ github.event.inputs.max_gemini_calls || '15' }}
          GEMINI_RPM_LIMIT: ${{ github.event.inputs.gemini_rpm_limit || '5' }}
          GEMINI_TPM_LIMIT: ${{ github.event.inputs.gemini_tpm_limit || '120000' }}
          MAX_TEXT_CHARS: ${{ github.event.inputs.max_text_chars || '90000' }}
          GEMINI_TOKEN_ESTIMATE_CHARS_PER_TOKEN: ${{ github.event.inputs.gemini_token_estimate_chars_per_token || '2.0' }}
          GEMINI_RETRY_MAX: "4"
          GEMINI_RETRY_BUFFER_MS: "1500"

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

          # SMTP secrets are kept for compatibility, but email is disabled via EMAIL_DISABLED=true.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

        run: node scripts/amku_monitor.mjs

      - name: Build AMCU dashboard data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/amku_build_dashboard.mjs

      - name: Commit AMCU practice and dashboard data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          mkdir -p data/practice
          mkdir -p docs/amku/data
          touch data/amku_events.jsonl

          git add data/amku_state.json
          git add data/amku_results.json
          git add data/amku_events.jsonl
          git add data/practice
          git add docs/amku

          if git diff --cached --quiet; then
            echo "No AMCU practice/dashboard data changes to commit."
          else
            git commit -m "Update AMCU practice dashboard"
            git push
          fi
